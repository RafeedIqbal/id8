openapi: 3.1.0
info:
  title: ID8 Operator API
  version: 0.1.0
  description: |
    MVP API contract for orchestrating prompt-to-production runs with HITL gates.
servers:
  - url: https://api.id8.local
paths:
  /v1/projects:
    get:
      summary: List projects with latest run summaries
      operationId: listProjects
      parameters:
        - name: include_deleted
          in: query
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Project list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectListResponse'
    post:
      summary: Create a project from a user prompt
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
  /v1/projects/{projectId}:
    get:
      summary: Get project status and metadata
      operationId: getProject
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Project found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
    patch:
      summary: Update editable setup fields for a project
      operationId: updateProject
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: Project updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
    delete:
      summary: Soft-delete a project
      operationId: deleteProject
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Project deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteProjectResponse'
  /v1/projects/{projectId}/restart:
    post:
      summary: Restart project pipeline from IngestPrompt
      operationId: restartProject
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '202':
          description: Restart accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
  /v1/projects/{projectId}/runs:
    post:
      summary: Start or resume a run
      operationId: createRun
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRunRequest'
      responses:
        '202':
          description: Run accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectRun'
  /v1/projects/{projectId}/runs/latest:
    get:
      summary: Get latest run with timeline events
      operationId: getLatestRun
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Latest run detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectRunDetail'
  /v1/design/tools:
    get:
      summary: List readable Stitch tool inventory for operator UI
      operationId: listDesignTools
      responses:
        '200':
          description: Tool inventory
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DesignToolsResponse'
  /v1/projects/{projectId}/design/generate:
    post:
      summary: Generate or regenerate design artifacts
      operationId: generateDesign
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DesignGenerateRequest'
      responses:
        '202':
          description: Design job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactResponse'
  /v1/projects/{projectId}/design/feedback:
    post:
      summary: Submit targeted design feedback for regeneration
      operationId: submitDesignFeedback
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DesignFeedbackRequest'
      responses:
        '202':
          description: Feedback accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactResponse'
  /v1/projects/{projectId}/approvals:
    post:
      summary: Approve or reject a stage
      operationId: submitApproval
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalRequest'
      responses:
        '200':
          description: Approval recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalEvent'
  /v1/projects/{projectId}/artifacts:
    get:
      summary: List project artifacts
      operationId: listArtifacts
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Artifacts list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProjectArtifact'
                required:
                  - items
  /v1/projects/{projectId}/deploy:
    post:
      summary: Deploy the latest approved build
      operationId: deployProject
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeployRequest'
      responses:
        '202':
          description: Deploy accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentRecord'
components:
  parameters:
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
  schemas:
    DesignProvider:
      type: string
      enum:
        - stitch_mcp
        - internal_spec
        - manual_upload
    ModelProfile:
      type: string
      enum:
        - primary
        - customtools
        - fallback
    ProjectStatus:
      type: string
      enum:
        - ideation
        - prd_draft
        - prd_approved
        - design_draft
        - design_approved
        - tech_plan_draft
        - tech_plan_approved
        - codegen
        - security_gate
        - deploy_ready
        - deploying
        - deployed
        - failed
    ArtifactType:
      type: string
      enum:
        - prd
        - design_spec
        - tech_plan
        - code_snapshot
        - security_report
        - deploy_report
    ApprovalStage:
      type: string
      enum:
        - prd
        - design
        - tech_plan
        - deploy
    StitchAuthMethod:
      type: string
      enum:
        - api_key
        - oauth_access_token
    StitchAuthPayload:
      type: object
      properties:
        auth_method:
          $ref: '#/components/schemas/StitchAuthMethod'
        api_key:
          type: string
        oauth_token:
          type: string
        goog_user_project:
          type: string
    DesignTool:
      type: object
      properties:
        name:
          type: string
        params:
          type: array
          items:
            type: string
        description:
          type: string
      required:
        - name
        - params
        - description
    DesignToolsResponse:
      type: object
      properties:
        provider:
          $ref: '#/components/schemas/DesignProvider'
        usable_tools:
          type: array
          items:
            $ref: '#/components/schemas/DesignTool'
      required:
        - provider
        - usable_tools
    CreateProjectRequest:
      type: object
      properties:
        title:
          type: string
        initial_prompt:
          type: string
        constraints:
          type: object
          additionalProperties: true
        stack_json:
          $ref: '#/components/schemas/StackJson'
      required:
        - title
        - initial_prompt
    UpdateProjectRequest:
      type: object
      properties:
        title:
          type: string
        initial_prompt:
          type: string
        stack_json:
          $ref: '#/components/schemas/StackJson'
    CreateRunRequest:
      type: object
      properties:
        resume_from_node:
          type: string
        model_profile:
          $ref: '#/components/schemas/ModelProfile'
        replay_mode:
          $ref: '#/components/schemas/ReplayMode'
    ReplayMode:
      type: string
      enum:
        - retry_failed
        - replay_from_node
    StackJson:
      type: object
      properties:
        frontend_framework:
          type: string
          enum: [nextjs]
        backend_framework:
          type: string
          enum: [nextjs]
        database:
          type: string
          enum: [none]
        database_provider:
          type: string
          enum: [none]
        hosting_frontend:
          type: string
          enum: [vercel]
        hosting_backend:
          type: string
          enum: [vercel]
      required:
        - frontend_framework
        - backend_framework
        - database
        - database_provider
        - hosting_frontend
        - hosting_backend
    DesignGenerateRequest:
      type: object
      properties:
        provider:
          $ref: '#/components/schemas/DesignProvider'
        model_profile:
          $ref: '#/components/schemas/ModelProfile'
        prompt_constraints:
          type: object
          additionalProperties: true
        stitch_auth:
          $ref: '#/components/schemas/StitchAuthPayload'
      required:
        - provider
        - model_profile
    DesignFeedbackRequest:
      type: object
      properties:
        target_screen_id:
          type: string
        target_component_id:
          type: string
        feedback_text:
          type: string
        stitch_auth:
          $ref: '#/components/schemas/StitchAuthPayload'
      required:
        - feedback_text
    ApprovalRequest:
      type: object
      properties:
        stage:
          $ref: '#/components/schemas/ApprovalStage'
        decision:
          type: string
          enum:
            - approved
            - rejected
        notes:
          type: string
        artifact_id:
          type: string
          format: uuid
      required:
        - stage
        - decision
    DeployRequest:
      type: object
      properties:
        target:
          type: string
          default: production
        artifact_id:
          type: string
          format: uuid
    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
        owner_user_id:
          type: string
          format: uuid
        title:
          type: string
        initial_prompt:
          type: string
        status:
          $ref: '#/components/schemas/ProjectStatus'
        github_repo_url:
          type: string
        live_deployment_url:
          type: string
        deleted_at:
          type: string
          format: date-time
        stack_json:
          $ref: '#/components/schemas/StackJson'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - owner_user_id
        - title
        - initial_prompt
        - status
        - created_at
        - updated_at
    DeleteProjectResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        deleted_at:
          type: string
          format: date-time
      required:
        - id
        - deleted_at
    ProjectRunSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/ProjectStatus'
        current_node:
          type: string
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - status
        - current_node
        - updated_at
    ProjectListItem:
      allOf:
        - $ref: '#/components/schemas/Project'
        - type: object
          properties:
            latest_run:
              $ref: '#/components/schemas/ProjectRunSummary'
    ProjectListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProjectListItem'
      required:
        - items
    ProjectRun:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/ProjectStatus'
        current_node:
          type: string
        idempotency_key:
          type: string
        last_error_code:
          type: string
        last_error_message:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - project_id
        - status
        - current_node
        - created_at
        - updated_at
    RunTimelineEvent:
      type: object
      properties:
        event_type:
          type: string
        from_node:
          type: string
        to_node:
          type: string
        outcome:
          type: string
        created_at:
          type: string
          format: date-time
      required:
        - event_type
        - to_node
        - created_at
    ProjectRunDetail:
      allOf:
        - $ref: '#/components/schemas/ProjectRun'
        - type: object
          properties:
            timeline:
              type: array
              items:
                $ref: '#/components/schemas/RunTimelineEvent'
          required:
            - timeline
    ProjectArtifact:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        run_id:
          type: string
          format: uuid
        artifact_type:
          $ref: '#/components/schemas/ArtifactType'
        version:
          type: integer
        content:
          type: object
          additionalProperties: true
        model_profile:
          $ref: '#/components/schemas/ModelProfile'
        created_at:
          type: string
          format: date-time
      required:
        - id
        - project_id
        - run_id
        - artifact_type
        - version
        - content
        - created_at
    ArtifactResponse:
      type: object
      properties:
        artifact:
          $ref: '#/components/schemas/ProjectArtifact'
      required:
        - artifact
    ApprovalEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        run_id:
          type: string
          format: uuid
        stage:
          $ref: '#/components/schemas/ApprovalStage'
        decision:
          type: string
        notes:
          type: string
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
      required:
        - id
        - project_id
        - run_id
        - stage
        - decision
        - created_by
        - created_at
    DeploymentRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        environment:
          type: string
        status:
          type: string
        url:
          type: string
        created_at:
          type: string
          format: date-time
      required:
        - id
        - project_id
        - environment
        - status
        - created_at
