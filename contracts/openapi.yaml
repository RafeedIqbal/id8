openapi: 3.1.0
info:
  title: ID8 Operator API
  version: 0.1.0
  description: |
    MVP API contract for orchestrating prompt-to-production runs with HITL gates.
servers:
  - url: https://api.id8.local
paths:
  /v1/projects:
    post:
      summary: Create a project from a user prompt
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
  /v1/projects/{projectId}:
    get:
      summary: Get project status and metadata
      operationId: getProject
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Project found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
  /v1/projects/{projectId}/runs:
    post:
      summary: Start or resume a run
      operationId: createRun
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRunRequest'
      responses:
        '202':
          description: Run accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectRun'
  /v1/projects/{projectId}/design/generate:
    post:
      summary: Generate or regenerate design artifacts
      operationId: generateDesign
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DesignGenerateRequest'
      responses:
        '202':
          description: Design job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactResponse'
  /v1/projects/{projectId}/design/feedback:
    post:
      summary: Submit targeted design feedback for regeneration
      operationId: submitDesignFeedback
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DesignFeedbackRequest'
      responses:
        '202':
          description: Feedback accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactResponse'
  /v1/projects/{projectId}/approvals:
    post:
      summary: Approve or reject a stage
      operationId: submitApproval
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalRequest'
      responses:
        '200':
          description: Approval recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalEvent'
  /v1/projects/{projectId}/artifacts:
    get:
      summary: List project artifacts
      operationId: listArtifacts
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Artifacts list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProjectArtifact'
                required:
                  - items
  /v1/projects/{projectId}/deploy:
    post:
      summary: Deploy the latest approved build
      operationId: deployProject
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeployRequest'
      responses:
        '202':
          description: Deploy accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentRecord'
components:
  parameters:
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
  schemas:
    DesignProvider:
      type: string
      enum:
        - stitch_mcp
        - internal_spec
        - manual_upload
    ModelProfile:
      type: string
      enum:
        - primary
        - customtools
        - fallback
    ProjectStatus:
      type: string
      enum:
        - ideation
        - prd_draft
        - prd_approved
        - design_draft
        - design_approved
        - tech_plan_draft
        - tech_plan_approved
        - codegen
        - security_gate
        - deploy_ready
        - deploying
        - deployed
        - failed
    ArtifactType:
      type: string
      enum:
        - prd
        - design_spec
        - tech_plan
        - code_snapshot
        - security_report
        - deploy_report
    ApprovalStage:
      type: string
      enum:
        - prd
        - design
        - tech_plan
        - deploy
    CreateProjectRequest:
      type: object
      properties:
        initial_prompt:
          type: string
        constraints:
          type: object
          additionalProperties: true
      required:
        - initial_prompt
    CreateRunRequest:
      type: object
      properties:
        resume_from_node:
          type: string
        model_profile:
          $ref: '#/components/schemas/ModelProfile'
    DesignGenerateRequest:
      type: object
      properties:
        provider:
          $ref: '#/components/schemas/DesignProvider'
        model_profile:
          $ref: '#/components/schemas/ModelProfile'
        prompt_constraints:
          type: object
          additionalProperties: true
      required:
        - provider
        - model_profile
    DesignFeedbackRequest:
      type: object
      properties:
        target_screen_id:
          type: string
        target_component_id:
          type: string
        feedback_text:
          type: string
      required:
        - feedback_text
    ApprovalRequest:
      type: object
      properties:
        stage:
          $ref: '#/components/schemas/ApprovalStage'
        decision:
          type: string
          enum:
            - approved
            - rejected
        notes:
          type: string
      required:
        - stage
        - decision
    DeployRequest:
      type: object
      properties:
        target:
          type: string
          default: production
        artifact_id:
          type: string
          format: uuid
    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
        initial_prompt:
          type: string
        status:
          $ref: '#/components/schemas/ProjectStatus'
        github_repo_url:
          type: string
        live_deployment_url:
          type: string
      required:
        - id
        - initial_prompt
        - status
    ProjectRun:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/ProjectStatus'
        current_node:
          type: string
      required:
        - id
        - project_id
        - status
        - current_node
    ProjectArtifact:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        artifact_type:
          $ref: '#/components/schemas/ArtifactType'
        version:
          type: integer
        content:
          type: object
          additionalProperties: true
      required:
        - id
        - project_id
        - artifact_type
        - version
    ArtifactResponse:
      type: object
      properties:
        artifact:
          $ref: '#/components/schemas/ProjectArtifact'
      required:
        - artifact
    ApprovalEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        stage:
          $ref: '#/components/schemas/ApprovalStage'
        decision:
          type: string
        notes:
          type: string
      required:
        - id
        - project_id
        - stage
        - decision
    DeploymentRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        environment:
          type: string
        status:
          type: string
        url:
          type: string
      required:
        - id
        - project_id
        - environment
        - status
